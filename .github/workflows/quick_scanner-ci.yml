name: scanning tools CI

# Lints and unit-tests the hardened scanning tools (quick_scanner,
# basic_ping_sweep). All tests mock the network (connect / resolver / pinger)
# — nothing here scans or pings a live host.

on:
  push:
    paths:
      - "cybersecurity-domains/application-security/programming-and-scripting-for-cybersecurity/recon_scripts/scanning/quick_scanner.py"
      - "cybersecurity-domains/application-security/programming-and-scripting-for-cybersecurity/recon_scripts/scanning/scanner_lib.py"
      - "cybersecurity-domains/application-security/programming-and-scripting-for-cybersecurity/recon_scripts/scanning/basic_ping_sweep.py"
      - "cybersecurity-domains/application-security/programming-and-scripting-for-cybersecurity/recon_scripts/scanning/sweep_lib.py"
      - "cybersecurity-domains/application-security/programming-and-scripting-for-cybersecurity/recon_scripts/scanning/python_nmap.py"
      - "cybersecurity-domains/application-security/programming-and-scripting-for-cybersecurity/recon_scripts/scanning/nmap_lib.py"
      - "cybersecurity-domains/application-security/programming-and-scripting-for-cybersecurity/recon_scripts/scanning/simple_scapy_scan.py"
      - "cybersecurity-domains/application-security/programming-and-scripting-for-cybersecurity/recon_scripts/scanning/scapscan.py"
      - "cybersecurity-domains/application-security/programming-and-scripting-for-cybersecurity/recon_scripts/scanning/tests/**"
      - ".github/workflows/quick_scanner-ci.yml"
  pull_request:
    paths:
      - "cybersecurity-domains/application-security/programming-and-scripting-for-cybersecurity/recon_scripts/scanning/quick_scanner.py"
      - "cybersecurity-domains/application-security/programming-and-scripting-for-cybersecurity/recon_scripts/scanning/scanner_lib.py"
      - "cybersecurity-domains/application-security/programming-and-scripting-for-cybersecurity/recon_scripts/scanning/basic_ping_sweep.py"
      - "cybersecurity-domains/application-security/programming-and-scripting-for-cybersecurity/recon_scripts/scanning/sweep_lib.py"
      - "cybersecurity-domains/application-security/programming-and-scripting-for-cybersecurity/recon_scripts/scanning/python_nmap.py"
      - "cybersecurity-domains/application-security/programming-and-scripting-for-cybersecurity/recon_scripts/scanning/nmap_lib.py"
      - "cybersecurity-domains/application-security/programming-and-scripting-for-cybersecurity/recon_scripts/scanning/simple_scapy_scan.py"
      - "cybersecurity-domains/application-security/programming-and-scripting-for-cybersecurity/recon_scripts/scanning/scapscan.py"
      - "cybersecurity-domains/application-security/programming-and-scripting-for-cybersecurity/recon_scripts/scanning/tests/**"
      - ".github/workflows/quick_scanner-ci.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cybersecurity-domains/application-security/programming-and-scripting-for-cybersecurity/recon_scripts/scanning
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt
      - name: Lint (ruff)
        run: ruff check quick_scanner.py scanner_lib.py basic_ping_sweep.py sweep_lib.py python_nmap.py nmap_lib.py simple_scapy_scan.py scapscan.py tests/
      - name: Unit tests (network mocked)
        run: python -m pytest -q
